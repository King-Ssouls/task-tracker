{% extends "base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<section class="bg-gradient-to-br from-slate-900 to-blue-900 text-white rounded-2xl shadow-xl p-8 md:p-12">
    <div class="max-w-3xl">
        <p class="text-blue-300 font-semibold mb-3">TASK TRACKER</p>
        <h1 class="text-3xl md:text-5xl font-bold mb-5">Работайте над проектами вместе</h1>
        <p class="text-lg text-slate-200 leading-relaxed mb-8">
            Находите интересные проекты, вступайте в команды, планируйте спринты
            и выполняйте задачи без лишней путаницы.
        </p>
        <div class="flex flex-wrap gap-4">
            <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('main.login') }}" class="bg-blue-500 hover:bg-blue-400 text-white px-5 py-3 rounded-lg font-semibold">
                Войти в аккаунт
            </a>
            <a href="{{ url_for('main.projects') }}" class="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-5 py-3 rounded-lg font-semibold">
                Поискать проекты
            </a>
        </div>
    </div>
</section>
<section class="usage-steps-root" aria-label="Как начать работу"></section>
{% endblock %}
