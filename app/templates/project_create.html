{% extends "base.html" %}

{% block title %}Создание проекта{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow p-6 max-w-xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Создание проекта</h1>

    <form method="post" class="space-y-4">
        <div>
            <label class="block mb-1">Название проекта</label>
            <input type="text" name="name" class="w-full border rounded px-3 py-2" required>
        </div>

        <div>
            <label class="block mb-1">Описание</label>
            <textarea name="description" class="w-full border rounded px-3 py-2"></textarea>
        </div>

        <button class="bg-blue-600 text-white px-4 py-2 rounded">
            Создать
        </button>
    </form>
</div>
{% endblock %}
