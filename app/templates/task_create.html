{% extends "base.html" %}

{% block title %}Создание задачи{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow p-6 max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Создание задачи</h1>

    <form method="post" class="space-y-4">
        <div>
            <label class="block mb-1">Спринт</label>
            {% if selected_sprint %}
                <input type="hidden" name="sprint_id" value="{{ selected_sprint.id }}">
                <div class="w-full bg-slate-100 border rounded px-3 py-2 font-semibold">
                    {{ selected_sprint.name }} — {{ selected_sprint.project.name }}
                </div>
            {% else %}
                <select name="sprint_id" class="w-full border rounded px-3 py-2" required>
                    {% for sprint in sprints %}
                        <option value="{{ sprint.id }}">{{ sprint.name }} — {{ sprint.project.name }}</option>
                    {% endfor %}
                </select>
            {% endif %}
        </div>

        <div>
            <label class="block mb-1">Исполнитель</label>
            <select name="assignee_id" class="w-full border rounded px-3 py-2">
                <option value="">Не назначен</option>
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.full_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block mb-1">Название</label>
            <input type="text" name="title" class="w-full border rounded px-3 py-2" required>
        </div>

        <div>
            <label class="block mb-1">Описание</label>
            <textarea name="description" class="w-full border rounded px-3 py-2"></textarea>
        </div>

        <div>
            <label class="block mb-1">Статус</label>
            <select name="status" class="w-full border rounded px-3 py-2">
                {% for status in statuses %}
                    <option value="{{ status }}">{{ status }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block mb-1">Story points</label>
            <input type="number" name="story_points" value="1" min="1" max="100" class="w-full border rounded px-3 py-2">
        </div>

        <div>
            <label class="block mb-1">Дедлайн</label>
            <input type="date" name="deadline" class="w-full border rounded px-3 py-2">
        </div>

        <button class="bg-blue-600 text-white px-4 py-2 rounded">
            Создать
        </button>
    </form>
</div>
{% endblock %}
